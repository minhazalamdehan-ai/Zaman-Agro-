<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Trading Journal</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --primary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --border: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary);
        }

        /* Dashboard Styles */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: var(--text-muted);
            font-size: 16px;
        }

        .card p {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
        }

        /* Form Styles */
        .form-section {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            background-color: #2a2a2a;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: #fff;
            box-sizing: border-box;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Table Styles */
        .table-section {
            background-color: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: #252525;
            color: var(--text-muted);
        }

        .profit-text { color: var(--success); }
        .loss-text { color: var(--danger); }

        .delete-btn {
            background-color: var(--danger);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Crypto Trading Journal</h1>

    <!-- Dashboard/Stats -->
    <div class="dashboard">
        <div class="card">
            <h3>মোট ট্রেড</h3>
            <p id="total-trades">0</p>
        </div>
        <div class="card">
            <h3>উইন রেট (Win Rate)</h3>
            <p id="win-rate" style="color: var(--primary);">0%</p>
        </div>
        <div class="card">
            <h3>মোট লাভ/লস ($)</h3>
            <p id="net-profit">0.00</p>
        </div>
    </div>

    <!-- Trade Input Form -->
    <div class="form-section">
        <h3>নতুন ট্রেড এন্ট্রি করুন</h3>
        <form id="trade-form">
            <div class="form-grid">
                <div>
                    <label for="coin-name">কয়েনের নাম</label>
                    <input type="text" id="coin-name" placeholder="যেমন: BTC, ETH" required>
                </div>
                <div>
                    <label for="entry-price">এন্ট্রি প্রাইস ($)</label>
                    <input type="number" id="entry-price" step="any" placeholder="0.00" required>
                </div>
                <div>
                    <label for="exit-price">এক্সিট প্রাইস ($)</label>
                    <input type="number" id="exit-price" step="any" placeholder="0.00" required>
                </div>
                <div>
                    <label for="investment">মোট ইনভেস্ট ($)</label>
                    <input type="number" id="investment" step="any" placeholder="যেমন: 10" required>
                </div>
            </div>
            <button type="submit">জার্নালে যোগ করুন</button>
        </form>
    </div>

    <!-- Trade History Table -->
    <div class="table-section">
        <table>
            <thead>
                <tr>
                    <th>কয়েন</th>
                    <th>এন্ট্রি ($)</th>
                    <th>এক্সিট ($)</th>
                    <th>ইনভেস্ট ($)</th>
                    <th>লাভ/লস ($)</th>
                    <th>শতকরা (%)</th>
                    <th>অ্যাকশন</th>
                </tr>
            </thead>
            <tbody id="trade-rows">
                <!-- ডাইনামিক ডেটা এখানে আসবে -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // ডমিন্যান্ট এলিমেন্টস সিলেক্ট করা
    const tradeForm = document.getElementById('trade-form');
    const tradeRows = document.getElementById('trade-rows');
    const totalTradesEl = document.getElementById('total-trades');
    const winRateEl = document.getElementById('win-rate');
    const netProfitEl = document.getElementById('net-profit');

    // LocalStorage থেকে ডেটা লোড করা
    let trades = JSON.parse(localStorage.getItem('trading_journal_trades')) || [];

    // ফর্ম সাবমিট হ্যান্ডলার
    tradeForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const coin = document.getElementById('coin-name').value.toUpperCase();
        const entry = parseFloat(document.getElementById('entry-price').value);
        const exit = parseFloat(document.getElementById('exit-price').value);
        const investment = parseFloat(document.getElementById('investment').value);

        // লাভ বা লসের পার্সেন্টেজ হিসাব (Exit - Entry) / Entry * 100
        const percentage = ((exit - entry) / entry) * 100;
        // ডলার হিসেবে কত লাভ বা লস হলো
        const pnlAmount = (investment * percentage) / 100;

        const newTrade = {
            id: Date.now(),
            coin,
            entry,
            exit,
            investment,
            pnlAmount,
            percentage
        };

        trades.push(newTrade);
        updateLocalStorage();
        renderData();
        tradeForm.reset();
    });

    // ডেটা ডিলিট করার ফাংশন
    function deleteTrade(id) {
        trades = trades.filter(trade => trade.id !== id);
        updateLocalStorage();
        renderData();
    }

    // LocalStorage আপডেট করা
    function updateLocalStorage() {
        localStorage.setItem('trading_journal_trades', JSON.stringify(trades));
    }

    // স্ক্রিনে ডেটা ও ড্যাশবোর্ড আপডেট করা
    function renderData() {
        tradeRows.innerHTML = '';
        
        let totalTrades = trades.length;
        let winTrades = 0;
        let totalPnL = 0;

        trades.forEach(trade => {
            totalPnL += trade.pnlAmount;
            if (trade.pnlAmount > 0) {
                winTrades++;
            }

            const row = document.createElement('tr');
            const pnlClass = trade.pnlAmount >= 0 ? 'profit-text' : 'loss-text';
            const sign = trade.pnlAmount >= 0 ? '+' : '';

            row.innerHTML = `
                <td><b>${trade.coin}</b></td>
                <td>${trade.entry.toFixed(4)}</td>
                <td>${trade.exit.toFixed(4)}</td>
                <td>${trade.investment.toFixed(2)}</td>
                <td class="${pnlClass}">${sign}${trade.pnlAmount.toFixed(2)}</td>
                <td class="${pnlClass}">${sign}${trade.percentage.toFixed(2)}%</td>
                <td><button class="delete-btn" onclick="deleteTrade(${trade.id})">ডিলিট</button></td>
            `;
            tradeRows.appendChild(row);
        });

        // ড্যাশবোর্ড স্ট্যাটস হিসাব
        const winRate = totalTrades > 0 ? (winTrades / totalTrades) * 100 : 0;

        totalTradesEl.innerText = totalTrades;
        winRateEl.innerText = winRate.toFixed(1) + '%';
        netProfitEl.innerText = totalPnL.toFixed(2);
        
        // ড্যাশবোর্ডের টোটাল প্রফিটের কালার পরিবর্তন
        if (totalPnL >= 0) {
            netProfitEl.className = 'profit-text';
        } else {
            netProfitEl.className = 'loss-text';
        }
    }

    // প্রথমবার পেজ লোড হলে ডেটা দেখানো
    renderData();
</script>

</body>
    </html>
