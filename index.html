<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consistency = Success</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --primary: #f39c12;
            --success: #2ecc71;
            --danger: #e74c3c;
            --border: #333333;
            --buy-color: #2ecc71;
            --sell-color: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 36px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Dashboard Styles */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: var(--text-muted);
            font-size: 16px;
        }

        .card p {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
        }

        /* Form Styles */
        .form-section {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            background-color: #2a2a2a;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: #fff;
            box-sizing: border-box;
        }

        button {
            background-color: var(--primary);
            color: black;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Table Styles */
        .table-section {
            background-color: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: #252525;
            color: var(--text-muted);
        }

        .profit-text { color: var(--success); }
        .loss-text { color: var(--danger); }
        
        .badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-buy { background-color: rgba(46, 204, 113, 0.2); color: var(--buy-color); }
        .badge-sell { background-color: rgba(231, 76, 60, 0.2); color: var(--sell-color); }

        .delete-btn {
            background-color: var(--danger);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Consistency = Success</h1>
    <div class="subtitle">Crypto Trading Journal</div>

    <!-- Dashboard/Stats -->
    <div class="dashboard">
        <div class="card">
            <h3>মোট ট্রেড</h3>
            <p id="total-trades">0</p>
        </div>
        <div class="card">
            <h3>উইন রেট (Win Rate)</h3>
            <p id="win-rate" style="color: var(--primary);">0%</p>
        </div>
        <div class="card">
            <h3>মোট লাভ/লস ($)</h3>
            <p id="net-profit">0.00</p>
        </div>
    </div>

    <!-- Trade Input Form -->
    <div class="form-section">
        <h3>নতুন ট্রেড ডাটা এন্ট্রি করুন</h3>
        <form id="trade-form">
            <div class="form-grid">
                <div>
                    <label for="coin-name">কয়েনের নাম</label>
                    <input type="text" id="coin-name" placeholder="যেমন: BTC" required>
                </div>
                <div>
                    <label for="trade-type">ট্রেড টাইপ</label>
                    <select id="trade-type" required>
                        <option value="BUY">BUY (Long)</option>
                        <option value="SELL">SELL (Short)</option>
                    </select>
                </div>
                <div>
                    <label for="entry-price">এন্ট্রি প্রাইস ($)</label>
                    <input type="number" id="entry-price" step="any" placeholder="0.00" required>
                </div>
                <div>
                    <label for="exit-price">এক্সিট প্রাইস ($)</label>
                    <input type="number" id="exit-price" step="any" placeholder="0.00" required>
                </div>
                <div>
                    <label for="leverage">লিভারেজ (X)</label>
                    <input type="number" id="leverage" min="1" max="125" value="1" placeholder="যেমন: 10" required>
                </div>
                <div>
                    <label for="investment">মার্জিন/ইনভেস্ট ($)</label>
                    <input type="number" id="investment" step="any" placeholder="যেমন: 10" required>
                </div>
            </div>
            <button type="submit">জার্নালে যোগ করুন</button>
        </form>
    </div>

    <!-- Trade History Table -->
    <div class="table-section">
        <table>
            <thead>
                <tr>
                    <th>কয়েন</th>
                    <th>টাইপ</th>
                    <th>লিভারেজ</th>
                    <th>এন্ট্রি ($)</th>
                    <th>এক্সিট ($)</th>
                    <th>ইনভেস্ট ($)</th>
                    <th>লাভ/লস ($)</th>
                    <th>শতকরা (%)</th>
                    <th>অ্যাকশন</th>
                </tr>
            </thead>
            <tbody id="trade-rows">
                <!-- ডাইনামিক ডেটা এখানে আসবে -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const tradeForm = document.getElementById('trade-form');
    const tradeRows = document.getElementById('trade-rows');
    const totalTradesEl = document.getElementById('total-trades');
    const winRateEl = document.getElementById('win-rate');
    const netProfitEl = document.getElementById('net-profit');

    let trades = JSON.parse(localStorage.getItem('crypto_journal_v2')) || [];

    tradeForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const coin = document.getElementById('coin-name').value.toUpperCase();
        const type = document.getElementById('trade-type').value;
        const entry = parseFloat(document.getElementById('entry-price').value);
        const exit = parseFloat(document.getElementById('exit-price').value);
        const leverage = parseFloat(document.getElementById('leverage').value);
        const investment = parseFloat(document.getElementById('investment').value);

        // লাভ বা লসের পার্সেন্টেজ হিসাব (লিভারেজ সহ)
        let percentage = 0;
        if (type === 'BUY') {
            // লং ট্রেড: দাম বাড়লে লাভ
            percentage = ((exit - entry) / entry) * 100 * leverage;
        } else {
            // শর্ট ট্রেড: দাম কমলে লাভ
            percentage = ((entry - exit) / entry) * 100 * leverage;
        }

        // ডলার হিসেবে লাভ বা লস
        const pnlAmount = (investment * percentage) / 100;

        const newTrade = {
            id: Date.now(),
            coin,
            type,
            leverage,
            entry,
            exit,
            investment,
            pnlAmount,
            percentage
        };

        trades.push(newTrade);
        updateLocalStorage();
        renderData();
        tradeForm.reset();
        document.getElementById('leverage').value = "1"; // ডিফল্ট ভ্যালু রিসেট
    });

    function deleteTrade(id) {
        trades = trades.filter(trade => trade.id !== id);
        updateLocalStorage();
        renderData();
    }

    function updateLocalStorage() {
        localStorage.setItem('crypto_journal_v2', JSON.stringify(trades));
    }

    function renderData() {
        tradeRows.innerHTML = '';
        
        let totalTrades = trades.length;
        let winTrades = 0;
        let totalPnL = 0;

        trades.forEach(trade => {
            totalPnL += trade.pnlAmount;
            if (trade.pnlAmount > 0) {
                winTrades++;
            }

            const row = document.createElement('tr');
            const pnlClass = trade.pnlAmount >= 0 ? 'profit-text' : 'loss-text';
            const badgeClass = trade.type === 'BUY' ? 'badge-buy' : 'badge-sell';
            const sign = trade.pnlAmount >= 0 ? '+' : '';

            row.innerHTML = `
                <td><b>${trade.coin}</b></td>
                <td><span class="badge ${badgeClass}">${trade.type}</span></td>
                <td>${trade.leverage}x</td>
                <td>${trade.entry.toFixed(4)}</td>
                <td>${trade.exit.toFixed(4)}</td>
                <td>$${trade.investment.toFixed(2)}</td>
                <td class="${pnlClass}">${sign}$${trade.pnlAmount.toFixed(2)}</td>
                <td class="${pnlClass}">${sign}${trade.percentage.toFixed(2)}%</td>
                <td><button class="delete-btn" onclick="deleteTrade(${trade.id})">ডিলিট</button></td>
            `;
            tradeRows.appendChild(row);
        });

        const winRate = totalTrades > 0 ? (winTrades / totalTrades) * 100 : 0;

        totalTradesEl.innerText = totalTrades;
        winRateEl.innerText = winRate.toFixed(1) + '%';
        netProfitEl.innerText = (totalPnL >= 0 ? '+' : '') + totalPnL.toFixed(2);
        
        if (totalPnL >= 0) {
            netProfitEl.className = 'profit-text';
        } else {
            netProfitEl.className = 'loss-text';
        }
    }

    renderData();
</script>

</body>
    </html>
