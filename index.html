<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consistency = Success | Cloud Journal</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #e0e0e0; --primary: #f39c12; --success: #2ecc71; --danger: #e74c3c; --border: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        .hidden { display: none !important; }
        
        /* Login Screen Styles */
        .auth-container { max-width: 380px; margin: 80px auto; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #252525; border: 1px solid var(--border); color: #fff; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:hover { background: #e68a00; }
        .btn-logout { background: #333; color: #fff; width: auto; padding: 6px 15px; font-size: 12px; }

        /* Journal Table & Dashboard */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }
        .form-section { background: var(--card); padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--border); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        .table-wrapper { overflow-x: auto; background: var(--card); border-radius: 10px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 850px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
        th { background: #222; color: #888; }
        .profit { color: var(--success); } .loss { color: var(--danger); }
        .action-btns { display: flex; gap: 8px; }
        .edit-btn { background: #3498db; color: #fff; border:none; padding: 5px 10px; border-radius: 4px; cursor:pointer;}
        .del-btn { background: var(--danger); color: #fff; border:none; padding: 5px 10px; border-radius: 4px; cursor:pointer;}
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen" class="auth-container">
        <h1 style="color:var(--primary); margin-top:0;">BZ' Jurnal</h1>
        <p style="color:#888; font-size: 14px;">আপনার ট্রেডিং জার্নাল সুরক্ষিত রাখুন</p>
        <input type="email" id="email" placeholder="আপনার ইমেইল">
        <input type="password" id="password" placeholder="পাসওয়ার্ড">
        <button class="btn-primary" onclick="handleAuth()">Login / Sign Up</button>
        <p id="auth-msg" style="font-size:12px; margin-top:15px; color:var(--danger)"></p>
        <p style="font-size:11px; color:#666; margin-top:20px;">*প্রথমবার ব্যবহারের সময় যেকোনো ইমেইল ও পাসওয়ার্ড দিয়ে সাইন-আপ করে নিন।</p>
    </div>

    <div id="journal-screen" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color:var(--primary); margin:0;">Consistency = Success</h2>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>

        <div class="dashboard">
            <div class="card"><h3>মোট ট্রেড</h3><p id="stat-total">0</p></div>
            <div class="card"><h3>উইন</h3><p id="stat-win" class="profit">0</p></div>
            <div class="card"><h3>লস</h3><p id="stat-loss" class="loss">0</p></div>
            <div class="card"><h3>উইন রেট</h3><p id="stat-rate" style="color:var(--primary)">0%</p></div>
            <div class="card"><h3>প্রফিট ($)</h3><p id="stat-pnl">$0.00</p></div>
        </div>

        <div class="form-section">
            <form id="trade-form">
                <input type="hidden" id="edit-id">
                <div class="form-grid">
                    <div><label style="font-size:11px; color:#888">কয়েন</label><input type="text" id="coin" placeholder="BTC" required></div>
                    <div><label style="font-size:11px; color:#888">টাইপ</label><select id="type"><option value="BUY">BUY</option><option value="SELL">SELL</option></select></div>
                    <div><label style="font-size:11px; color:#888">এন্ট্রি ($)</label><input type="number" id="entry" step="any" required></div>
                    <div><label style="font-size:11px; color:#888">এক্সিট ($)</label><input type="number" id="exit" step="any" required></div>
                    <div><label style="font-size:11px; color:#888">স্টপ লস ($)</label><input type="number" id="sl" step="any"></div>
                    <div><label style="font-size:11px; color:#888">লিভারেজ</label><input type="number" id="lev" value="1"></div>
                    <div><label style="font-size:11px; color:#888">ইনভেস্ট ($)</label><input type="number" id="inv" required></div>
                    <div><label style="font-size:11px; color:#888">তারিখ</label><input type="date" id="date" required></div>
                </div>
                <button type="submit" class="btn-primary" id="submit-btn" style="margin-top:15px;">ট্রেড সেভ করুন</button>
            </form>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>তারিখ</th><th>কয়েন</th><th>টাইপ</th><th>এন্ট্রি/এক্সিট</th><th>RR</th><th>PnL ($)</th><th>শতকরা (%)</th><th>অ্যাকশন</th></tr>
                </thead>
                <tbody id="trade-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- আপনার ফায়ারবেস কনফিগ ---
    const firebaseConfig = {
      apiKey: "AIzaSyCtMX_5nLTGSY07_p8K9W2p-Dk8H7_H6_k", // আপনার স্ক্রিনশট থেকে
      authDomain: "bz--jurnal.firebaseapp.com",
      projectId: "bz--jurnal",
      storageBucket: "bz--jurnal.appspot.com",
      messagingSenderId: "36426317634",
      appId: "1:36426317634:web:3693d44364667f072bd2db",
      measurementId: "G-G1CCMY1B2N"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // --- অথেন্টিকেশন ফাংশন ---
    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(!email || !pass) return alert("ইমেইল ও পাসওয়ার্ড দিন");

        auth.signInWithEmailAndPassword(email, pass).catch(error => {
            if (error.code === 'auth/user-not-found') {
                auth.createUserWithEmailAndPassword(email, pass).catch(e => {
                    document.getElementById('auth-msg').innerText = "ভুল ইমেইল বা পাসওয়ার্ড!";
                });
            } else {
                document.getElementById('auth-msg').innerText = "লগইন ব্যর্থ হয়েছে!";
            }
        });
    }

    function logout() { auth.signOut(); }

    // লগইন স্টেট মনিটর
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('journal-screen').classList.remove('hidden');
            loadTrades(user.uid);
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('journal-screen').classList.add('hidden');
        }
    });

    // --- ডাটাবেস ফাংশন ---
    let trades = [];
    function loadTrades(uid) {
        db.collection('users').doc(uid).collection('trades').orderBy('date', 'desc')
        .onSnapshot(snapshot => {
            trades = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            render();
        });
    }

    document.getElementById('trade-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const user = auth.currentUser;
        if(!user) return;

        const editId = document.getElementById('edit-id').value;
        const entry = parseFloat(document.getElementById('entry').value);
        const exit = parseFloat(document.getElementById('exit').value);
        const type = document.getElementById('type').value;
        const lev = parseFloat(document.getElementById('lev').value);
        const inv = parseFloat(document.getElementById('inv').value);
        const sl = parseFloat(document.getElementById('sl').value) || 0;

        let pct = (type === 'BUY' ? (exit - entry) / entry : (entry - exit) / entry) * 100 * lev;
        let rr = (sl > 0 && sl !== entry) ? (Math.abs(exit - entry) / Math.abs(entry - sl)).toFixed(2) : "N/A";

        const tradeData = {
            coin: document.getElementById('coin').value.toUpperCase(),
            type, entry, exit, sl, lev, inv, rr, pct,
            pnl: (inv * pct) / 100,
            date: document.getElementById('date').value
        };

        if(editId) {
            await db.collection('users').doc(user.uid).collection('trades').doc(editId).update(tradeData);
            document.getElementById('edit-id').value = "";
            document.getElementById('submit-btn').innerText = "ট্রেড সেভ করুন";
        } else {
            await db.collection('users').doc(user.uid).collection('trades').add(tradeData);
        }
        e.target.reset();
        document.getElementById('date').valueAsDate = new Date();
    });

    function render() {
        const list = document.getElementById('trade-list');
        list.innerHTML = "";
        let win = 0, loss = 0, totalPnl = 0;

        trades.forEach(t => {
            totalPnl += t.pnl;
            if(t.pnl > 0) win++; else if(t.pnl < 0) loss++;
            const row = `<tr>
                <td>${t.date}</td>
                <td><b>${t.coin}</b> <small>${t.lev}x</small></td>
                <td><span style="color:${t.type==='BUY'?'#2ecc71':'#e74c3c'}">${t.type}</span></td>
                <td>${t.entry} / ${t.exit}</td>
                <td>1:${t.rr}</td>
                <td class="${t.pnl>=0?'profit':'loss'}">${t.pnl.toFixed(2)}</td>
                <td class="${t.pnl>=0?'profit':'loss'}">${t.pct.toFixed(2)}%</td>
                <td class="action-btns">
                    <button class="edit-btn" onclick="editTrade('${t.id}')">Edit</button>
                    <button class="del-btn" onclick="deleteTrade('${t.id}')">Del</button>
                </td>
            </tr>`;
            list.innerHTML += row;
        });

        document.getElementById('stat-total').innerText = trades.length;
        document.getElementById('stat-win').innerText = win;
        document.getElementById('stat-loss').innerText = loss;
        document.getElementById('stat-rate').innerText = trades.length ? ((win/trades.length)*100).toFixed(1)+'%' : '0%';
        document.getElementById('stat-pnl').innerText = `$${totalPnl.toFixed(2)}`;
        document.getElementById('stat-pnl').className = totalPnl >= 0 ? 'profit' : 'loss';
    }

    async function deleteTrade(id) { if(confirm('ডিলিট করবেন?')) await db.collection('users').doc(auth.currentUser.uid).collection('trades').doc(id).delete(); }

    function editTrade(id) {
        const t = trades.find(t => t.id === id);
        document.getElementById('edit-id').value = t.id;
        document.getElementById('coin').value = t.coin;
        document.getElementById('entry').value = t.entry;
        document.getElementById('exit').value = t.exit;
        document.getElementById('sl').value = t.sl;
        document.getElementById('lev').value = t.lev;
        document.getElementById('inv').value = t.inv;
        document.getElementById('date').value = t.date;
        document.getElementById('submit-btn').innerText = "Update Trade Data";
        window.scrollTo(0,0);
    }

    document.getElementById('date').valueAsDate = new Date();
</script>

</body>
    </html>
